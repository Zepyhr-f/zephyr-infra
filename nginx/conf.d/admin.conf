server {
  listen 80;
  server_name admin.zephyr.green admin.localhost;

  client_max_body_size 20m;

  root /usr/share/nginx/www/admin;
  index index.html;

  location ^~ /api/zephyr-auth/ {
    resolver 127.0.0.11 valid=10s;
    set $target http://zephyr-gateway:8888;
    rewrite ^/api/zephyr-auth/(.*)$ /api/v1/auth/$1 break;
    proxy_pass $target;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  location ^~ /api/zephyr-system/ {
    resolver 127.0.0.11 valid=10s;
    set $target http://zephyr-gateway:8888;
    rewrite ^/api/zephyr-system/(.*)$ /api/v1/system/$1 break;
    proxy_pass $target;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  location ^~ /api/ {
    resolver 127.0.0.11 valid=10s;
    set $target http://zephyr-gateway:8888;
    proxy_pass $target;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
