server {
  listen 80;
  server_name blog.zephyr.green blog.localhost;

  client_max_body_size 20m;

  root /usr/share/nginx/www/blog;
  index index.html;

  location ^~ /api/ {
    resolver 127.0.0.11 valid=10s;
    set $target http://zephyr-gateway:8888;
    proxy_pass $target;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  location ^~ /ai-api/ {
    # Deprecated direct path: keep responding with 410 so callers migrate to
    # the unified /api/v1/ai/* route through zephyr-gateway.
    return 410 "/ai-api/ removed; use /api/v1/ai/* via gateway\n";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
