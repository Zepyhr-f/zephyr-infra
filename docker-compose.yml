version: "3.9"

services:
  # ------------------------------
  # PostgreSQL
  # ------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgsql-pgvector
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ${DATA_DIR}/pgsql/data:/var/lib/postgresql/data
      - ./pgsql:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - "listen_addresses=*"
      - -c
      - max_connections=30
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=128MB
      - -c
      - max_wal_size=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zephyr} -d ${POSTGRES_DB:-zephyrdb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------
  # Redis
  # ------------------------------
  redis:
    image: redis:7.2
    container_name: redis
    restart: always
    mem_limit: 128m
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--bind", "0.0.0.0"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${DATA_DIR}/redis/data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------
  # NATS
  # ------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: opsdock-nats
    restart: always
    mem_limit: 128m
    ports:
      - "127.0.0.1:${NATS_CLIENT_PORT:-4222}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - ${DATA_DIR}/nats/data:/data
    command:
      - "--name"
      - "nats"
      - "--jetstream"
      - "--store_dir"
      - "/data"
      - "--http_port"
      - "8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20


  # ------------------------------
  # MinIO
  # ------------------------------
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    restart: always
    mem_limit: 256m
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${DATA_DIR}/minio/data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ------------------------------
  # Nginx
  # ------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: always
    mem_limit: 64m
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ${DATA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR}/nginx/www:/usr/share/nginx/www:ro
      - /app/logs/nginx:/var/log/nginx
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  default:
    name: infra_default
    driver: bridge
